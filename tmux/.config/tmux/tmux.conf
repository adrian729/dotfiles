set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Set the prefix to C-Space instead of C-b
unbind C-b
set -g prefix C-Space

set -g history-limit 100000
set -g renumber-windows on

# Set the base index for windows and panes to 1 (easier to press than starting at 0)
set -g base-index 1
set-window-option -g pane-base-index 1

set -g pane-border-status top
set-window-option -g mode-keys vi

# Fix cursor conflicts with Neovim
set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

set -g mouse on
setw -g monitor-activity on

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
set -g display-time 4000
set -g status-interval 1
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# KEY BINDINGS

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'Reloaded ~/config/tmux/tmux.conf'
bind-key -T prefix v copy-mode
unbind -T copy-mode-vi Space
bind -T copy-mode-vi v send-keys -X begin-selection

# Use the system clipboard instead of tmux's paste buffer
unbind -T copy-mode-vi Enter # unbind DEFAULT for copy-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
bind w switch-client -T wt
bind -T wt t neww -c "#{pane_current_path}" wt-sessionizer
bind -T wt w choose-tree -Zw
bind-key -r s run-shell "tmux neww ~/.local/scripts/tmux-session-tracker"
bind b switch-client -l
bind ? run-shell "tmux neww -n keymaps ~/.local/scripts/tmux-keymaps"

set -g default-terminal "tmux-256color"
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato or mocha

#WINDOW
# leave this unset to let applications set the window title
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_maroon}"

# set -g @catppuccin_date_time_text "%Y/%m/%d-%H:%M:%S"
set -g @catppuccin_date_time_text " %Y.%m.%d-%H:%M"
set -g @catppuccin_status_default "on"
set -g @catppuccin_status_background "default"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_connect_separator "yes"
set -g pane-border-format " #[fg=#{@thm_flamingo}]#{pane_current_path} #[fg=#{@thm_peach}]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD) "
set -g @catppuccin_pane_active_border_style "fg=#{@thm_pink}" # Use a value compatible with the standard tmux 'pane-border-active-style'

# LOAD catppuccin
# - Load without TPM
# run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux 
# - Load with TPM
run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-left ""
set -g status-right ""
set -g status-left-length 100
set -g status-right-length 200
# Seems like first status-left/right needs to be -g instead of -ag
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#(~/.local/scripts/tmux-usage-status)#(~/.local/scripts/tmux-ollama-status)#[bg=#{@thm_flamingo},fg=#{@thm_crust}]#[reverse]#[noreverse]󱀙 #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{ram_percentage} "
set -g @catppuccin_status_cpu_bg_color "#{@thm_pink}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_battery}"

bind C-o popup -E -d "#{pane_current_path}" -w 95% -h 95% "opencode"
bind C-c popup -E -d "#{pane_current_path}" -w 95% -h 95% "claude"

# Tmux Plugin Manager - https://github.com/tmux-plugins/tpm
# prefix + I - install, prefix + U - update, prefix + alt + u - remove/uninstall plugins not in list
set -g @tpm_plugins '            \
    tmux-plugins/tpm             \
    tmux-plugins/tmux-resurrect  \
    tmux-plugins/tmux-cpu        \
    tmux-plugins/tmux-battery    \
    catppuccin/tmux#latest       \
    tmux-plugins/tmux-copycat    \
    laktak/extrakto
'

# Install TPM first from https://github.com/tmux-plugins/tpm
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
